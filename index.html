<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Join us as we celebrate our wedding. RSVP, travel info, registry, and more."
    />
    <title>We're Getting Married</title>

    <!-- Fonts: clean serif for headings, readable sans for body -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              cream: "#faf6ef",
              "warm-white": "#fffdf8",
              sage: "#9cb79f",
              "pale-sage": "#cfe0d2",
              forest: "#3d5a44",
              rose: "#c48a84",
              "pale-rose": "#f2d9d5",
              gold: "#c9a96a",
            },
            fontFamily: {
              serif: ['"Cormorant Garamond"', "serif"],
              sans: ["Inter", "system-ui", "sans-serif"],
            },
            animation: {
              "fade-in-up": "fadeInUp 1.2s ease-out both",
              "pulse-slow": "pulseSlow 8s ease-in-out infinite",
              "bounce-slow": "bounceSlow 2.5s ease-in-out infinite",
            },
            keyframes: {
              fadeInUp: {
                "0%": { opacity: "0", transform: "translateY(24px)" },
                "100%": { opacity: "1", transform: "translateY(0)" },
              },
              pulseSlow: {
                "0%, 100%": { opacity: "0.4", transform: "scale(1)" },
                "50%": { opacity: "0.7", transform: "scale(1.08)" },
              },
              bounceSlow: {
                "0%, 100%": { transform: "translate(-50%, 0)" },
                "50%": { transform: "translate(-50%, 8px)" },
              },
            },
          },
        },
      };
    </script>

    <style type="text/tailwindcss">
      @layer base {
        html {
          scroll-behavior: smooth;
        }
        body {
          @apply bg-cream text-forest font-sans antialiased;
        }
        ::selection {
          background: #c9a96a;
          color: #faf6ef;
        }
      }
      @layer components {
        .btn-primary {
          @apply inline-flex items-center gap-2 bg-forest text-cream px-6 py-3 rounded-full text-sm uppercase tracking-[0.15em] font-medium hover:bg-rose transition-colors shadow-sm;
        }
        .btn-secondary {
          @apply inline-flex items-center gap-2 border border-forest/40 text-forest px-5 py-2.5 rounded-full text-xs uppercase tracking-[0.15em] font-medium hover:bg-forest hover:text-cream transition-colors;
        }
        .input {
          @apply w-full bg-warm-white border border-sage/30 rounded-lg px-4 py-3 text-forest placeholder:text-forest/40 focus:outline-none focus:ring-2 focus:ring-gold/50 focus:border-gold/50 transition;
        }
      }
    </style>

    <!-- React (CDN, no build step) + Babel for in-browser JSX -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body>
    <div id="root"></div>

    <!-- All editable content lives here -->
    <script src="./config.js"></script>
    <!-- The React app (JSX, transpiled in-browser by Babel) -->
    <script type="text/babel" data-presets="react" src="./app.js"></script>
  </body>
</html>
